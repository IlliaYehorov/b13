<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>B13 | Access Manual</title>
  <style>
    :root { --accent: #00d1b2; --bg: #0f0f0f; --card: #1a1a1a; --text: #ffffff; }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; display: flex; justify-content: center; padding: 20px; }
    .container { max-width: 450px; width: 100%; background: var(--card); padding: 30px; border-radius: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); border: 1px solid #222; }
    .logo { color: var(--accent); font-weight: 900; font-size: 24px; letter-spacing: -1px; margin-bottom: 30px; text-align: center; }
    .ip-box { background: #000; padding: 25px; border-radius: 12px; text-align: center; margin: 20px 0; border: 1px dashed var(--accent); }
    #user-ip { font-family: "SF Mono", monospace; font-size: 32px; color: var(--accent); display: block; }
    .btn { background: var(--accent); color: #000; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: 700; cursor: pointer; margin-top: 10px; text-decoration: none; display: block; text-align: center; }
    .btn-wa { background: #25D366; color: white; margin-top: 10px; }
    .info-row { background: #222; padding: 12px; border-radius: 8px; margin-top: 15px; font-size: 13px; display: flex; justify-content: space-between; align-items: center; }
    code { color: var(--accent); }
  </style>
</head>
<body>

<div class="container">
  <div class="logo">BABYLON13 / ACCESS</div>
  
  <p style="text-align:center; font-size: 14px; color: #888;">Твій поточний IP для доступу:</p>
  
  <div class="ip-box">
    <span id="user-ip">...визначаємо...</span>
  </div>

  <button class="btn" onclick="copyIp()">СКОПІЮВАТИ IP</button>
  
  <a id="wa-link" href="#" target="_blank" class="btn btn-wa">ВІДПРАВИТИ АДМІНУ (WHATSAPP)</a>

  <div style="margin-top: 30px; border-top: 1px solid #333; padding-top: 20px;">
    <p style="font-size: 12px; color: #666; text-transform: uppercase; font-weight: bold;">Дані сервера:</p>
    <div class="info-row">
      <span>Finder (SMB):</span>
      <code onclick="copyText('smb://192.168.88.200')">smb://192.168.88.200</code>
    </div>
    <div class="info-row">
      <span>Admin Panel:</span>
      <code onclick="copyText('http://192.168.88.200:8080')">:8080</code>
    </div>
  </div>
</div>

<script>
  const adminPhone = "380XXXXXXXXX"; // ВПИШІТЬ ВАШ НОМЕР

  fetch('https://api64.ipify.org?format=json')
    .then(res => res.json())
    .then(data => {
      const ip = data.ip;
      document.getElementById('user-ip').innerText = ip;
      
      // Формуємо лінк для WhatsApp
      const message = encodeURIComponent("Привіт! Додай мій IP у TRUSTED-WANS: " + ip);
      document.getElementById('wa-link').href = `https://wa.me/${adminPhone}?text=${message}`;
    });

  function copyIp() {
    const ip = document.getElementById('user-ip').innerText;
    navigator.clipboard.writeText(ip);
    alert("IP скопійовано!");
  }

  function copyText(text) {
    navigator.clipboard.writeText(text);
    alert("Скопійовано: " + text);
  }
</script>

</body>
</html>
